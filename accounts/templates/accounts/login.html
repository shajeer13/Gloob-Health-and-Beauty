<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login / Sign Up - GlooB</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body { 
    background-color: rgb(230, 31, 117); 
    font-family: Arial, sans-serif; 
}
.form-container { 
    max-width: 400px; 
    margin: 100px auto; 
    background-color: white; 
    padding: 30px; 
    border-radius: 10px; 
    box-shadow: 0 4px 10px rgba(0,0,0,0.2); 
}
.form-container h2 { 
    text-align: center; 
    margin-bottom: 25px; 
    color: rgb(230, 31, 117); 
}
.form-group { margin-bottom: 15px; }
.form-group input { 
    width: 100%; 
    padding: 12px; 
    border-radius: 5px; 
    border: 1px solid #ccc; 
    font-size: 16px;
}
button { 
    background-color: rgb(230, 31, 117); 
    color: white; 
    width: 100%; 
    padding: 12px; 
    border: none; 
    border-radius: 5px; 
    font-size: 16px;
}
button:hover { background-color: #d12799; }
a { 
    display: block; 
    text-align: center; 
    margin-top: 10px; 
    color: rgb(230, 31, 117); 
    text-decoration: none; 
}
a:hover { text-decoration: underline; }
.error-msg { color: red; font-size: 14px; margin-bottom: 10px; text-align: center; }
</style>
</head>
<body>

<div class="form-container">
    <h2>Login</h2>
    <form method="post">
        {% csrf_token %}

        <!-- Email field -->
        <div class="form-group">
            {{ form.username.label_tag }}
            {{ form.username }}
            {% if form.username.errors %}
                <div class="error-msg">{{ form.username.errors }}</div>
            {% endif %}
        </div>

        <!-- Password field -->
        <div class="form-group">
            {{ form.password.label_tag }}
            {{ form.password }}
            {% if form.password.errors %}
                <div class="error-msg">{{ form.password.errors }}</div>
            {% endif %}
        </div>

        <button type="submit">Login</button>
    </form>

    <a href="{% url 'signup' %}">Don't have an account? Sign Up</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
