<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GlooB Cart</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{ font-family:'Segoe UI',sans-serif; padding:20px; background:#f8f8f8; }
h3{ margin-bottom:20px; }
.cart-item{ display:flex; align-items:center; margin-bottom:15px; background:white; padding:10px; border-radius:10px; box-shadow:0 4px 10px rgba(0,0,0,0.05);}
.cart-item img{ width:70px; height:70px; object-fit:contain; margin-right:10px; border-radius:10px; }
.item-details{ flex:1; }
.item-details p{ margin:2px 0; font-size:14px; }
.remove-btn{ border:none; background:#ff5fa2; color:white; padding:5px 8px; border-radius:5px; cursor:pointer; }
.price-breakdown{ background:white; padding:10px; border-radius:10px; margin-top:20px; box-shadow:0 4px 10px rgba(0,0,0,0.05);}
.price-breakdown h5{ margin-bottom:10px; }
.price-breakdown div{ display:flex; justify-content:space-between; margin:5px 0; font-size:14px; }
#placeOrder{ margin-top:20px; padding:10px; border:none; background:#ec4899; color:white; border-radius:10px; width:100%; font-size:16px; }
</style>
</head>
<body>

<h3>🛒 Your Cart</h3>

<div id="cartItems"></div>

<div class="price-breakdown">
<h5>Price Details</h5>
<div><span>Price (1 item each)</span><span id="priceEach">₹0</span></div>
<div><span>Discount</span><span id="discount">-₹0</span></div>
<div><span>Coupons Applied</span><span id="coupon">-₹0</span></div>
<div><span>Platform Fee</span><span id="platformFee">₹0</span></div>
<hr>
<div><strong>Total Amount</strong><strong id="totalAmount">₹0</strong></div>
</div>

<button id="placeOrder">Place Order</button>

<script>
// Fetch cart
function renderCart(){
    const cart = JSON.parse(localStorage.getItem("cart"))||[];
    const container = document.getElementById("cartItems");
    container.innerHTML="";

    if(cart.length===0){
        container.innerHTML="<p>Your cart is empty.</p>";
        document.getElementById("priceEach").textContent="₹0";
        document.getElementById("discount").textContent="-₹0";
        document.getElementById("coupon").textContent="-₹0";
        document.getElementById("platformFee").textContent="₹0";
        document.getElementById("totalAmount").textContent="₹0";
        return;
    }

    let priceEach=0, discount=0, coupon=0, platformFee=0;

    cart.forEach(item=>{
        const div=document.createElement("div");
        div.className="cart-item";
        div.innerHTML=`
            <img src="${item.image}">
            <div class="item-details">
                <p><strong>${item.name}</strong></p>
                <p>Qty: ${item.qty}</p>
                <p>Price: ₹${item.price} x ${item.qty}</p>
            </div>
            <button class="remove-btn" onclick="removeItem(${item.id})">Remove</button>
        `;
        container.appendChild(div);

        // Simple price calculations
        priceEach += item.price*item.qty;
        discount += Math.floor(item.price*item.qty*0.1); // 10% discount
        coupon += Math.floor(item.price*item.qty*0.05);  // 5% coupon
        platformFee += 20*item.qty; // Flat ₹20 per item
    });

    const totalAmount = priceEach - discount - coupon + platformFee;

    document.getElementById("priceEach").textContent="₹"+priceEach;
    document.getElementById("discount").textContent="-₹"+discount;
    document.getElementById("coupon").textContent="-₹"+coupon;
    document.getElementById("platformFee").textContent="₹"+platformFee;
    document.getElementById("totalAmount").textContent="₹"+totalAmount;
}

// Remove item
function removeItem(id){
    let cart = JSON.parse(localStorage.getItem("cart"))||[];
    cart = cart.filter(p=>p.id!==id);
    localStorage.setItem("cart",JSON.stringify(cart));
    renderCart();
}

// Place order
document.getElementById("placeOrder").addEventListener("click",()=>{
    alert("🎉 Your order has been placed!");
    localStorage.removeItem("cart");
    renderCart();
});

renderCart();
</script>
</body>
</html>
