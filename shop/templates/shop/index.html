<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GlooB Shop</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- CSRF Token for JS (Django) -->
  <script>
    const csrf_token = '{{ csrf_token }}';
  </script>

  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(180deg,#ff5fa2,#ff8fb1);
      padding-bottom: 90px;
    }

    /* TOP BAR */
    .top-bar {
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(10px);
      padding: 10px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: white;
      position: sticky;
      top: 0;
      z-index: 1000;
    }

    .logo {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: 2px;
    }

    /* SEARCH */
    .search-box {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .search-box input {
      border-radius: 20px;
      border: none;
      padding: 6px 15px;
      width: 100%;
      outline: none;
    }
    .search-btn {
      border-radius: 20px;
      border: none;
      padding: 6px 12px;
      background: white;
      font-size: 18px;
      cursor: pointer;
    }

    /* PRODUCT CARD */
    .product-card {
      background: white;
      border-radius: 25px;
      padding: 20px;
      text-align: center;
      margin-bottom: 25px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.15);
      transition: 0.3s;
      cursor: pointer;
    }
    .product-card:hover {
      transform: translateY(-5px);
    }
    .product-card img {
      height: 160px;
      object-fit: contain;
      margin-bottom: 10px;
    }
    .product-title {
      font-size: 16px;
      font-weight: 600;
      min-height: 40px;
    }
    .price {
      font-weight: bold;
      font-size: 18px;
      margin: 8px 0;
    }
    .add-btn {
      background: linear-gradient(90deg,#2563eb,#ec4899);
      border: none;
      color: white;
      border-radius: 30px;
      padding: 8px 20px;
      width: 100%;
      cursor: pointer;
    }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      background: white;
      display: flex;
      justify-content: space-around;
      padding: 10px 0;
      box-shadow: 0 -3px 10px rgba(0,0,0,0.1);
    }
    .bottom-nav a {
      text-align: center;
      font-size: 14px;
      color: #555;
      text-decoration: none;
      position: relative;
    }
    .cart-count {
      position: absolute;
      top: -6px;
      right: 12px;
      background: #ec4899;
      color: white;
      border-radius: 50%;
      padding: 2px 6px;
      font-size: 12px;
      font-weight: bold;
    }

    /* MODAL */
    .modal-header {
      background: #ec4899;
      color: white;
    }
    .rating-stars {
      display: flex;
      gap: 5px;
      font-size: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="logo">GlooB 🌿</div>
    <div class="search-box">
      <input type="text" id="searchInput" placeholder="Search products">
      <button class="search-btn">🔍</button>
    </div>
  </div>

  <!-- PRODUCT LIST -->
  <div class="container mt-4">
    <div class="row" id="productList"></div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="bottom-nav">
    <a href="{% url 'shop' %}">🏠<br>Home</a>
   <a href="{% url 'cart' %}">🛒 <span id="cart-count" class="cart-count">0</span><br>Cart</a>
    <a href="{% url 'profile' %}">👤<br>Profile</a>
  </div>

  <!-- PRODUCT MODAL -->
  <div class="modal fade" id="productModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Order Summary</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <p><strong>Product:</strong> <span id="modalTitle"></span></p>
          <p><strong>Price:</strong> ₹<span id="modalPrice"></span></p>
          <p><strong>Delivery To:</strong> fayas, 123 Street, Oman, Phone: 1234567890</p>
          <p><strong>Quantity:</strong> <input type="number" id="modalQty" value="1" min="1"></p>
          <p><strong>Rating:</strong></p>
          <div class="rating-stars" id="ratingStars">
              <span data-star="1">★</span>
              <span data-star="2">★</span>
              <span data-star="3">★</span>
              <span data-star="4">★</span>
              <span data-star="5">★</span>
          </div>
        </div>
       <div class="modal-footer">
    <form method="post" action="{% url 'checkout' %}">
        {% csrf_token %}
        <input type="hidden" name="product_id" id="modalProductId">
        <input type="hidden" name="quantity" id="modalProductQty" value="1">
        <button type="submit" class="btn btn-success">Place Order</button>
    </form>
</div>
      </div>
    </div>
  </div>

  <!-- JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const products = [
      {title:"Beetroot Lip Balm", price:229, img:"https://www.gloobcare.com/cdn/shop/files/WhatsApp_Image_2025-12-19_at_6.19.26_PM_1.jpg"},
      {title:"Charcoal Face Wash", price:349, img:"https://www.gloobcare.com/cdn/shop/files/WhatsApp_Image_2025-12-20_at_5.00.44_PM.jpg"},
      {title:"Coffee Scrub", price:299, img:"https://www.gloobcare.com/cdn/shop/files/WhatsApp_Image_2025-12-20_at_4.04.58_PM.jpg"},
      {title:"24K Gold Skin Glow Serum", price:399, img:"https://www.gloobcare.com/cdn/shop/files/WhatsApp_Image_2025-12-17_at_4.22.25_PM.jpg"},
      {title:"Anti Ageing Cream", price:349, img:"https://www.gloobcare.com/cdn/shop/files/WhatsAppImage2026-01-07at6.54.41PM.jpg"},
      {title:"Foot Crack Cream", price:399, img:"https://www.gloobcare.com/cdn/shop/files/WhatsAppImage2026-01-07at7.03.38PM.jpg"},
      {title:"Korean Beauty Cream", price:999, img:"https://www.gloobcare.com/cdn/shop/files/WhatsAppImage2025-12-23at2.22.26PM.jpg"},
      {title:"Onion Hair Oil", price:349, img:"https://www.gloobcare.com/cdn/shop/files/WhatsApp_Image_2025-12-22_at_12.07.46_PM.jpg"},
      {title:"Onion Shampoo", price:299, img:"https://www.gloobcare.com/cdn/shop/files/WhatsApp_Image_2025-12-22_at_12.23.10_PM.jpg"},
      {title:"Sunscreen Lotion SPF 50", price:549, img:"https://www.gloobcare.com/cdn/shop/files/WhatsAppImage2025-12-19at7.00.54PM_3.jpg"},
      {title:"Sunscreen PA++ SPF 50", price:499, img:"https://www.gloobcare.com/cdn/shop/files/WhatsAppImage2025-12-18at11.34.57AM_1.jpg"},
      {title:"Hair Growth Serum", price:599, img:"https://www.gloobcare.com/cdn/shop/files/WhatsAppImage2026-01-07at6.39.09PM.jpg"},
      {title:"Multani Mitti", price:149, img:"https://www.gloobcare.com/cdn/shop/files/WhatsApp_Image_2025-12-22_at_1.35.26_PM.jpg"},
      {title:"Pure Aloe Vera Gel", price:119, img:"https://www.gloobcare.com/cdn/shop/files/WhatsApp_Image_2025-12-20_at_6.27.24_PM_1.jpg"},
      {title:"Strawberry Lip Balm", price:229, img:"https://www.gloobcare.com/cdn/shop/files/WhatsApp_Image_2025-12-19_at_4.34.15_PM_1.jpg"},
      {title:"Ubtan Scrub", price:299, img:"https://www.gloobcare.com/cdn/shop/files/WhatsApp_Image_2025-12-20_at_4.16.22_PM.jpg"},
      {title:"Under Eye Cream", price:299, img:"https://www.gloobcare.com/cdn/shop/files/WhatsApp_Image_2025-12-19_at_2.09.49_PM.jpg"},
    ];

    const productList = document.getElementById("productList");

    products.forEach((p, index) => {
      const col = document.createElement("div");
      col.className = "col-6 col-md-3 product-item";
      col.innerHTML = `
        <div class="product-card" data-index="${index}">
          <img src="${p.img}">
          <div class="product-title">${p.title}</div>
          <div class="price">₹${p.price}</div>
          <button class="add-btn add-to-cart">Add to Cart</button>
        </div>`;
      productList.appendChild(col);
    });

    /* CART COUNT */
    let cart = JSON.parse(localStorage.getItem("cart")) || [];
    document.getElementById("cart-count").textContent = cart.reduce((a,b)=>a+b.qty,0);

    /* ADD TO CART */
    document.addEventListener("click", function(e){
      if(e.target.classList.contains("add-to-cart")){
        const parent = e.target.closest(".product-card");
        const index = parseInt(parent.dataset.index);
        const product = { id: index+1, name: products[index].title, price: products[index].price, qty: 1 };
        let exist = cart.find(p => p.id === product.id);
        if(exist) exist.qty += 1;
        else cart.push(product);
        localStorage.setItem("cart", JSON.stringify(cart));
        document.getElementById("cart-count").textContent = cart.reduce((a,b)=>a+b.qty,0);
        alert("🛒 Product added to your cart!");
      }
    });

    /* PRODUCT MODAL ON IMAGE CLICK */
    document.addEventListener("click", function(e){
  if(e.target.closest(".product-card img")){
    const parent = e.target.closest(".product-card");
    const index = parseInt(parent.dataset.index);

    document.getElementById("modalTitle").innerText = products[index].title;
    document.getElementById("modalPrice").innerText = products[index].price;
    
    // Hidden inputs update
    document.getElementById("modalProductId").value = index + 1;
    document.getElementById("modalProductQty").value = 1;

    let myModal = new bootstrap.Modal(document.getElementById('productModal'));
    myModal.show();
  }
});

    /* SEARCH */
    document.getElementById("searchInput").addEventListener("keyup", function(){
      let value = this.value.toLowerCase();
      document.querySelectorAll(".product-item").forEach(function(product){
        let name = product.innerText.toLowerCase();
        product.style.display = name.includes(value) ? "block" : "none";
      });
    });

    /* RATING */
    const stars = document.querySelectorAll("#ratingStars span");
    stars.forEach(s => {
      s.addEventListener("click", () => {
        stars.forEach(x => x.style.color="black");
        for(let i=0;i<s.dataset.star;i++){
          stars[i].style.color="gold";
        }
      });
    });
  </script>
</body>
</html>
